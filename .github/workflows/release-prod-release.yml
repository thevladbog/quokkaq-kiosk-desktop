name: Release (prod-release)

on:
  push:
    branches: [prod-release]

# Avoid cancelling an in-flight release when a bump commit triggers a second run.
concurrency:
  group: release-prod-release-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  bump:
    name: Version bump
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.tag.outputs.version }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Determine bump type
        id: vtype
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $COMMIT_MSG"
          if [[ "$COMMIT_MSG" == *"[major]"* ]] || [[ "$COMMIT_MSG" == *"BREAKING CHANGE"* ]]; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif [[ "$COMMIT_MSG" == *"[minor]"* ]] || [[ "$COMMIT_MSG" == *"feat:"* ]]; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump synced versions
        id: bump_run
        run: |
          NEW=$(node scripts/bump-version.mjs "${{ steps.vtype.outputs.type }}")
          echo "new_version=$NEW" >> "$GITHUB_OUTPUT"
          echo "Bumped to $NEW"

      - name: Commit, push, tag
        id: tag
        env:
          VERSION: ${{ steps.bump_run.outputs.new_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/Cargo.toml src-tauri/tauri.conf.json
          git commit -m "chore: bump kiosk version to ${VERSION} [skip ci]"
          git tag "v${VERSION}"
          git push origin prod-release
          git push origin "v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.os }})
    needs: bump
    if: ${{ always() && (needs.bump.result == 'success' || needs.bump.result == 'skipped') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: windows-latest
          - os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: prod-release
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: npm ci

      - run: node scripts/build-agent.mjs

      - run: npm run tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.os }}
          path: src-tauri/target/release/bundle/

  release:
    name: GitHub Release
    needs: build
    if: ${{ success() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: prod-release
          fetch-depth: 0

      - name: Get version
        id: ver
        run: |
          V=$(node -p "require('./package.json').version")
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v$V" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: bundle-*
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: QuokkaQ Kiosk ${{ steps.ver.outputs.version }}
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: false
          draft: false
          make_latest: true
          allowUpdates: true
